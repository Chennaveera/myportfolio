<table>
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Message</th>
        <th>Action</th>
    </tr>

    <tr th:each="msg : ${messages}">
        <td th:text="${msg.name}"></td>
        <td th:text="${msg.email}"></td>
        <td th:text="${msg.message}"></td>
        <td>
            <form th:action="@{/admin/delete/{id}(id=${msg.id})}" method="post">
                <button type="submit" onclick="return confirm('Delete this message?')">
                    ❌ Remove
                </button>
            </form>
        </td>
    </tr>
</table>


</body>
